<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vasavi General Store</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #10b981; --bg: #f8fafc; --border: #e2e8f0; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        header { background: white; padding: 15px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--primary); }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .view { display: none; animation: slideUp 0.3s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; padding: 20px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; }
        
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); margin-top: 10px; }

        /* Store Grid - Items with Images */
        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .item-card { background: white; border-radius: 14px; padding: 10px; text-align: center; border: 1px solid var(--border); }
        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; margin-bottom: 8px; background: #f1f5f9; }
        .item-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; height: 35px; overflow: hidden; }
        .item-price { color: var(--primary); font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; }

        .cart-float { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #0f172a; color: white; padding: 18px; border-radius: 50px; text-align: center; font-weight: 700; z-index: 1000; display: none; }

        /* Bill Template - TEXT ONLY (No Logo/QR) */
        #bill-template { width: 450px; padding: 40px; background: white; color: black; position: absolute; left: -9999px; top: 0; border: 1px solid #000; }
        .bill-header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 20px; padding-bottom: 10px; }
        .bill-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .bill-table th { text-align: left; border-bottom: 1px solid #000; padding: 8px; font-weight: bold; }
        .bill-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .bill-total { text-align: right; font-weight: 700; font-size: 1.4rem; margin-top: 20px; }
    </style>
</head>
<body>

<div id="bill-template">
    <div class="bill-header">
        <h1 style="margin:0">VASAVI GENERAL STORE</h1>
        <p style="margin:5px 0">Bankapur Store Order Receipt</p>
    </div>
    <div id="bill-info" style="margin-bottom: 20px; line-height: 1.6;"></div>
    <table class="bill-table">
        <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
        <tbody id="bill-items"></tbody>
    </table>
    <div id="bill-grand-total" class="bill-total"></div>
    <p style="text-align:center; font-size: 0.8rem; margin-top: 30px; border-top: 1px solid #000; padding-top: 10px;">*** Digital Copy - No Signature Required ***</p>
</div>

<header><h1>Vasavi General Store</h1></header>

<div class="container">
    <div id="view-login" class="view">
        <div class="card">
            <h2>Welcome</h2>
            <label>Name</label><input type="text" id="u-name">
            <label>Phone</label><input type="tel" id="u-phone">
            <label>Door No</label><input type="text" id="u-door">
            <label>Street</label><input type="text" id="u-street">
            <label>Landmark/Address</label><input type="text" id="u-addr">
            <button class="btn btn-primary" onclick="doLogin()">Login & Start Shopping</button>
        </div>
    </div>

    <div id="view-store" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <p style="font-weight:600; color:#64748b">(Bankapur store)</p>
            <button class="btn" style="width:auto; padding:5px 10px; font-size:0.7rem; background:#eee;" onclick="logout()">Logout</button>
        </div>
        <div class="item-grid" id="product-list"></div>
        <div id="cart-float-btn" class="cart-float" onclick="nav('cart')">View Cart</div>
    </div>

    <div id="view-cart" class="view">
        <div class="card">
            <h2>My Cart</h2>
            <div id="cart-items-list"></div>
            <div style="border-top:2px solid #f1f5f9; padding-top:10px; margin-top:10px; font-weight:700;">Subtotal: <span id="cart-sub">₹0</span></div>
            <button class="btn btn-primary" style="margin-top:20px" onclick="nav('checkout')">Proceed</button>
            <button class="btn btn-outline" onclick="nav('store')">Add More</button>
        </div>
    </div>

    <div id="view-checkout" class="view">
        <div class="card">
            <h2>Delivery Option</h2>
            <select id="del-choice" onchange="calcTotal()">
                <option value="pickup">Self Pick-up (₹0)</option>
                <option value="home">Home Delivery (+₹40)</option>
            </select>
            <div id="check-summary" style="padding:10px; background:#f8fafc; border-radius:10px;"></div>
            <button class="btn btn-primary" onclick="nav('payment')">Next</button>
        </div>
    </div>

    <div id="view-payment" class="view">
        <div class="card" style="text-align:center">
            <h2>Payment Mode</h2>
            <select id="pay-choice">
                <option value="Paid Online">Already Paid (Online)</option>
                <option value="COD">Cash on Delivery</option>
            </select>
            <button id="place-order-btn" class="btn btn-primary" onclick="placeOrder()">Place Order & Send Bill</button>
        </div>
    </div>

    <div id="view-success" class="view" style="text-align:center;">
        <div style="font-size:5rem">✅</div>
        <h2>Order Confirmed!</h2>
        <p>The store has received your order image.</p>
        <button id="download-btn" class="btn btn-primary" style="background:#2563eb">Download Receipt (Image)</button>
        <button class="btn btn-outline" onclick="location.reload()">Back to Store</button>
    </div>
</div>

<script>
    const TG_TOKEN = "8668013778:AAEnWA0uY3tDUOQP1uHQEVJdcAGaWgfy4eA";
    const TG_ID = "7217028526";

    // ITEM LIST (Add your image paths in the 'img' property)
    const items = [
        { id: 1, name: "Basmati Rice (1kg)", price: 95, img: "rice.png" },
        { id: 2, name: "Sunflower Oil (1L)", price: 145, img: "oil.png" },
        { id: 3, name: "Sugar (1kg)", price: 42, img: "sugar.png" },
        { id: 4, name: "Toor Dal (1kg)", price: 165, img: "dal.png" },
        { id: 5, name: "Soap Pack", price: 120, img: "soap.png" },
        { id: 6, name: "Tea Powder", price: 250, img: "tea.png" }
    ];

    let cart = [];
    let user = JSON.parse(localStorage.getItem('vasavi_user'));
    let billBlob = null;

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    function nav(id) { window.history.pushState({view: id}, '', '#' + id); renderView(id); }
    window.onpopstate = (e) => renderView(e.state ? e.state.view : (user ? 'store' : 'login'));

    function renderView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        if(id === 'store') renderStore();
        if(id === 'cart') renderCart();
        if(id === 'checkout') calcTotal();
        document.getElementById('cart-float-btn').style.display = (id === 'store' && cart.length > 0) ? 'block' : 'none';
    }

    function doLogin() {
        user = { n: document.getElementById('u-name').value, p: document.getElementById('u-phone').value, dn: document.getElementById('u-door').value, st: document.getElementById('u-street').value, ad: document.getElementById('u-addr').value };
        if(!user.n || !user.p) return alert("Fill all details!");
        localStorage.setItem('vasavi_user', JSON.stringify(user));
        nav('store');
    }

    function logout() { localStorage.removeItem('vasavi_user'); location.reload(); }

    function renderStore() {
        document.getElementById('product-list').innerHTML = items.map(i => `
            <div class="item-card">
                <img src="${i.img}" class="item-img" onerror="this.src='logo.png'">
                <div class="item-name">${i.name}</div>
                <div class="item-price">₹${i.price}</div>
                <button class="btn btn-primary" style="padding:8px; font-size:0.8rem; border-radius:8px" onclick="addToCart(${i.id})">Add to Cart</button>
            </div>`).join('');
    }

    function addToCart(id) {
        const i = items.find(x => x.id === id);
        const ex = cart.find(x => x.id === id);
        ex ? ex.qty++ : cart.push({...i, qty: 1});
        document.getElementById('cart-float-btn').innerText = `View Cart (₹${cart.reduce((s,x)=>s+(x.price*x.qty),0)})`;
        document.getElementById('cart-float-btn').style.display = 'block';
    }

    function renderCart() {
        document.getElementById('cart-items-list').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f1f5f9"><span>${i.name} x${i.qty}</span><b>₹${i.price*i.qty}</b></div>`).join('');
        document.getElementById('cart-sub').innerText = `₹${cart.reduce((s,i)=>s+(i.price*i.qty),0)}`;
    }

    function calcTotal() {
        const s = cart.reduce((s,i)=>s+(i.price*i.qty),0), d = document.getElementById('del-choice').value === 'home' ? 40 : 0;
        document.getElementById('check-summary').innerHTML = `<p>Subtotal: ₹${s}</p><p>Delivery: ₹${d}</p><h3>Total: ₹${s+d}</h3>`;
    }

    async function placeOrder() {
        const btn = document.getElementById('place-order-btn');
        btn.innerText = "Generating Bill..."; btn.disabled = true;

        const sub = cart.reduce((s,i)=>s+(i.price*i.qty),0), d = document.getElementById('del-choice').value === 'home' ? 40 : 0, total = sub + d;

        // 1. Fill Text Bill
        document.getElementById('bill-info').innerHTML = `<b>Customer:</b> ${user.n} (${user.p})<br><b>Address:</b> ${user.dn}, ${user.st}, ${user.ad}<br><b>Mode:</b> ${document.getElementById('del-choice').value} | <b>Pay:</b> ${document.getElementById('pay-choice').value}`;
        document.getElementById('bill-items').innerHTML = cart.map(i => `<tr><td>${i.name}</td><td>${i.qty}</td><td>₹${i.price}</td><td>₹${i.price*i.qty}</td></tr>`).join('') + (d > 0 ? `<tr><td>Delivery Fee</td><td>1</td><td>₹40</td><td>₹40</td></tr>` : "");
        document.getElementById('bill-grand-total').innerText = `GRAND TOTAL: ₹${total}`;

        // 2. Generate Image
        const canvas = await html2canvas(document.getElementById('bill-template'));
        canvas.toBlob(async (blob) => {
            billBlob = blob;
            const formData = new FormData();
            formData.append('chat_id', TG_ID);
            formData.append('photo', blob, 'order.png');
            formData.append('caption', `🛍 New Order: ${user.n}\nTotal: ₹${total}`);

            // 3. Send to Telegram
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: formData });

            // 4. Set download link
            document.getElementById('download-btn').onclick = () => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Bill_Vasavi_${Date.now()}.png`;
                link.click();
            };
            nav('success');
        });
    }

    window.onload = () => { user ? nav('store') : nav('login'); };
</script>
</body>
</html>
